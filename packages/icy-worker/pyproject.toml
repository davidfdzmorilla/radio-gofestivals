[project]
name = "radio-gofestivals-icy-worker"
version = "0.1.0"
description = "radio.gofestivals · ICY metadata worker"
requires-python = ">=3.12,<3.13"
dependencies = [
    "httpx>=0.27.0",
    "redis[hiredis]>=5.0.7",
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "structlog>=24.4.0",
    "typer>=0.12.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.23.8",
    "pytest-mock>=3.14.0",
    "respx>=0.21.1",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
    "types-redis>=4.6.0",
]

[project.scripts]
icy-worker = "icy_worker.main:app"

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["icy_worker"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D", "ANN401", "COM812", "ISC001", "TRY003",
    "EM101", "EM102", "FBT001", "FBT002", "FBT003",
    "PLR0913", "PLR0915", "PLR0912",
    "TC001", "TC002", "TC003",
    "ASYNC109", "C901", "RUF100", "PYI034",
    "SIM108", "RUF059",
    "PLC0415",  # import dentro de función para warning diferido
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "S101", "PLR2004", "ANN", "INP001", "S311",
    "PLC0415", "TC002", "E501", "N817", "SLF001",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
files = ["icy_worker"]

[[tool.mypy.overrides]]
module = ["asyncpg.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
