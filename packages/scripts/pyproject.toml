[project]
name = "radio-gofestivals-scripts"
version = "0.1.0"
description = "radio.gofestivals · sync + maintenance scripts"
requires-python = ">=3.12,<3.13"
dependencies = [
    "httpx>=0.27.0",
    "asyncpg>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "dnspython>=2.6.0",
    "python-slugify>=8.0.4",
    "structlog>=24.4.0",
    "typer>=0.12.0",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "bcrypt>=4.2.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.23.8",
    "pytest-mock>=3.14.0",
    "respx>=0.21.1",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[project.scripts]
rb_sync = "scripts.rb_sync:app"
bootstrap-admin = "scripts.bootstrap_admin:app"
dedupe-stations = "scripts.dedupe_stations:app"

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.format]
quote-style = "double"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",        # docstrings opcionales
    "ANN401",
    "COM812",
    "ISC001",
    "TRY003",
    "EM101",
    "EM102",
    "FBT001",
    "FBT002",
    "FBT003",   # Typer usa bool positional en opciones
    "PLR0913",
    "PLR0915",  # el orquestador upsert es extenso pero lineal
    "TC001",
    "TC003",
    "ASYNC109", # timeout kwarg es idiomático aquí (no usamos asyncio.timeout)
    "RUF100",
    "PYI034",
    "C901",     # upsert_station linealmente complejo pero legible
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "PLR2004", "ANN", "INP001", "S311", "E501"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
warn_unused_ignores = true
files = ["scripts"]

[[tool.mypy.overrides]]
module = ["asyncpg.*", "slugify.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
